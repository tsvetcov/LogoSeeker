#################################### Paths ####################################
[paths]
# Папки для данных и логов внутри контейнера
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

#################################### Server ####################################
[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000

# root_url = %(protocol)s://%(domain)s:%(http_port)s/

#################################### Database ####################################
[database]
type = sqlite3
path = grafana.db

#################################### Security ####################################
[security]
admin_user = admin


admin_password = admin

allow_embedding = false

[users]
# Разрешить пользователям самостоятельно регистрироваться
allow_sign_up = false

[auth.anonymous]
enabled = false
# org_name = Main Org.
# org_role = Viewer

#################################### Dashboards ####################################
[dashboards]
# Время автоматического обновления дашбордов по умолчанию
versions_to_keep = 20

#################################### Logging ####################################
[log]
mode = console
level = info
